---
arch: ai85netfcosface
dataset: WIDERFACE_KD

layers:
  # Layer 0 - stem1: MaxPool2x2 + Conv3x3, 3->16ch, 224x224->112x112
  - pad: 1
    max_pool: 2
    pool_stride: 2
    activate: ReLU
    out_offset: 0x2000
    processors: 0x0000000000000007
    data_format: HWC
    op: conv2d
    streaming: true

  # Layer 1 - stem2: MaxPool2x2 + Conv3x3, 16->16ch, 112x112->56x56
  - pad: 1
    max_pool: 2
    pool_stride: 2
    activate: ReLU
    out_offset: 0x4000
    processors: 0x000000000000ffff
    op: conv2d
    streaming: true

  # Layer 2 - s2a: Conv3x3, 16->32ch, 56x56
  - pad: 1
    activate: ReLU
    out_offset: 0x0000
    processors: 0x000000000000ffff
    op: conv2d

  # Layer 3 - s2b: Conv3x3, 32->32ch, 56x56
  # out_offset 0x4000: s2a wrote 3136B/ch at 0x0000 (ends at 0x0C40).
  # 0x4000 gives genuine 16KB separation, avoiding runtime collision.
  - pad: 1
    activate: ReLU
    out_offset: 0x4000
    processors: 0x00000000ffffffff
    op: conv2d

  # Layer 4 - s3a: MaxPool2x2 + Conv3x3, 32->64ch, 56x56->28x28
  # s2b wrote at 0x4000 (ends at 0x4C40). s3a writes to 0x0000 -- clear.
  - pad: 1
    max_pool: 2
    pool_stride: 2
    activate: ReLU
    out_offset: 0x0000
    processors: 0x00000000ffffffff
    op: conv2d

  # Layer 5 - s3b: Conv3x3, 64->64ch, 28x28
  # 28x28 = 784B/ch. 0x2000 vs 0x0000: 8KB separation >> 784B. Safe.
  - pad: 1
    activate: ReLU
    out_offset: 0x2000
    processors: 0xffffffffffffffff
    op: conv2d

  # Layer 6 - h1: Conv3x3, 64->64ch, 28x28
  - pad: 1
    activate: ReLU
    out_offset: 0x0000
    processors: 0xffffffffffffffff
    op: conv2d

  # Layer 7 - h2: Conv3x3, 64->32ch, 28x28
  - pad: 1
    activate: ReLU
    out_offset: 0x2000
    processors: 0xffffffffffffffff
    op: conv2d

  # Layer 8 - head: Conv1x1, 32->5ch, 28x28 (wide=True, no BN/ReLU)
  - pad: 0
    activate: None
    kernel_size: "1x1"
    out_offset: 0x4000
    output_width: 32
    processors: 0x00000000ffffffff
    op: conv2d